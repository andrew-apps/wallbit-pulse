# Wallbit Pulse — Render Blueprint (FREE tier)
# Plan: free en ambos servicios · sin disco persistente · sin Playwright
# Docs: https://render.com/docs/blueprint-spec

envVarGroups:
  - name: wallbit-pulse-secrets
    envVars:
      - key: WALLBIT_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false

services:
  - type: web
    name: wallbit-pulse-api
    runtime: python
    region: oregon
    plan: free
    repo: https://github.com/andrew-apps/wallbit-pulse
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - fromGroup: wallbit-pulse-secrets
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ENVIRONMENT
        value: production
      - key: WALLBIT_BASE_URL
        value: https://api.wallbit.io
      - key: TELEGRAM_BOT_USERNAME
        value: wallbit_radar_bot
      - key: TELEGRAM_USE_POLLING
        value: "false"
      - key: CEREBRAS_MODEL
        value: gpt-oss-120b
      - key: YAHOO_DEFAULT_PERIOD
        value: 1y
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./wallbit_pulse.db
      - key: FRONTEND_URL
        fromService:
          type: web
          name: wallbit-pulse-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: wallbit-pulse-web
    runtime: node
    region: oregon
    plan: free
    repo: https://github.com/andrew-apps/wallbit-pulse
    branch: main
    rootDir: front
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: wallbit-pulse-api
          envVarKey: RENDER_EXTERNAL_URL
